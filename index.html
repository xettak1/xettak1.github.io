<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MT LAB</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-bg="bg_1.jpg">
    <main class="container">
        <h1 class="title">Sign Up</h1>
        <p class="subtitle">Please enter your details to create an account</p>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label for="email">Email/Phone</label>
                <input id="email" type="email" placeholder="Email or Mobile number" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Set your Password" required>
            </div>
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="signin.html">Sign in</a>
        </p>

        <div class="social-section">
            <p>or continue with</p>
            <div class="social-icons">
                <img src="/images/g_1.png" alt="Google">
                <img src="/images/ap_1.png" alt="Apple">
                <img src="/images/fb_1.png" alt="Facebook">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
