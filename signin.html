<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MT LAB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-bg="bg5.jpg">
    <main class="container">
        <h1 class="title">Sign In</h1>
        <p class="subtitle">Please enter your details to sign into your account</p>
        
        <form id="signinForm">
            <div class="input-group">
                <label for="nameInput">Name</label>
                <input type="text" id="nameInput" placeholder="Name" required>
            </div>
            <div class="input-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-secondary">Sign In</button>
        </form>

        <p class="footer-text">
            New here? <a href="index.html">Create an account</a>
        </p>

        <div class="social-section">
            <p>or continue with</p>
            <div class="social-icons">
                <img src="g_1.png" alt="Google">
                <img src="ap_1.png" alt="Apple">
                <img src="fb_1.png" alt="Facebook">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
